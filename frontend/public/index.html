<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Estata — Buyer Portal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:         #0a0a0a;
      --surface:    #111111;
      --surface2:   #181818;
      --border:     #252525;
      --border2:    #333333;
      --gold:       #c9a96e;
      --gold-dim:   #9a7a4a;
      --text:       #f0ebe3;
      --text-dim:   #888880;
      --text-muted: #555550;
      --danger:     #c0392b;
      --success:    #27ae60;
      --radius:     4px;
      --radius-lg:  8px;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }

    /* ─── PAGES ─────────────────────────────── */
    .page { display: none; min-height: 100vh; }
    .page.active { display: flex; }

    /* ─── AUTH PAGE ─────────────────────────── */
    #page-auth {
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
      background:
        radial-gradient(ellipse 60% 60% at 20% 80%, rgba(201,169,110,0.07) 0%, transparent 70%),
        radial-gradient(ellipse 50% 50% at 80% 20%, rgba(201,169,110,0.05) 0%, transparent 60%),
        var(--bg);
    }

    .auth-logo {
      text-align: center;
      margin-bottom: 48px;
    }
    .auth-logo h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 42px;
      font-weight: 300;
      letter-spacing: 0.15em;
      color: var(--text);
    }
    .auth-logo h1 span { color: var(--gold); font-style: italic; }
    .auth-logo p {
      color: var(--text-muted);
      font-size: 12px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      margin-top: 6px;
    }

    .auth-card {
      width: 100%;
      max-width: 420px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      overflow: hidden;
    }

    .auth-tabs {
      display: flex;
      border-bottom: 1px solid var(--border);
    }
    .auth-tab {
      flex: 1;
      padding: 16px;
      background: none;
      border: none;
      color: var(--text-muted);
      font-family: 'DM Sans', sans-serif;
      font-size: 12px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.2s;
    }
    .auth-tab.active {
      color: var(--gold);
      background: rgba(201,169,110,0.05);
      border-bottom: 2px solid var(--gold);
      margin-bottom: -1px;
    }

    .auth-form-wrap { padding: 32px; }
    .auth-form { display: none; }
    .auth-form.active { display: block; }

    .form-group { margin-bottom: 20px; }
    .form-group label {
      display: block;
      font-size: 11px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 8px;
    }
    .form-group input {
      width: 100%;
      padding: 12px 14px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
    }
    .form-group input:focus { border-color: var(--gold-dim); }
    .form-group input::placeholder { color: var(--text-muted); }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 12px 24px;
      border: none;
      border-radius: var(--radius);
      font-family: 'DM Sans', sans-serif;
      font-size: 12px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-primary {
      width: 100%;
      background: var(--gold);
      color: #0a0a0a;
      font-weight: 500;
    }
    .btn-primary:hover:not(:disabled) { background: #d4b47f; }
    .btn-ghost {
      background: none;
      border: 1px solid var(--border);
      color: var(--text-dim);
    }
    .btn-ghost:hover { border-color: var(--border2); color: var(--text); }
    .btn-danger-ghost {
      background: none;
      border: 1px solid transparent;
      color: var(--text-muted);
      font-size: 11px;
      padding: 6px 10px;
    }
    .btn-danger-ghost:hover { color: var(--danger); border-color: rgba(192,57,43,0.3); }

    .auth-alert {
      padding: 12px 14px;
      border-radius: var(--radius);
      font-size: 13px;
      margin-bottom: 20px;
      display: none;
    }
    .auth-alert.error { background: rgba(192,57,43,0.12); border: 1px solid rgba(192,57,43,0.3); color: #e74c3c; }
    .auth-alert.success { background: rgba(39,174,96,0.12); border: 1px solid rgba(39,174,96,0.3); color: #2ecc71; }

    /* ─── DASHBOARD ─────────────────────────── */
    #page-dashboard {
      flex-direction: column;
      background: var(--bg);
    }

    /* Header */
    .dash-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 40px;
      height: 64px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .dash-header-logo {
      font-family: 'Cormorant Garamond', serif;
      font-size: 24px;
      font-weight: 300;
      letter-spacing: 0.12em;
    }
    .dash-header-logo span { color: var(--gold); font-style: italic; }
    .dash-header-right {
      display: flex;
      align-items: center;
      gap: 24px;
    }
    .user-badge {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .user-avatar {
      width: 36px;
      height: 36px;
      background: rgba(201,169,110,0.15);
      border: 1px solid var(--gold-dim);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Cormorant Garamond', serif;
      font-size: 16px;
      color: var(--gold);
    }
    .user-info { line-height: 1.3; }
    .user-name { font-size: 13px; font-weight: 500; color: var(--text); }
    .user-role {
      font-size: 10px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--text-muted);
    }

    /* Dashboard body */
    .dash-body { padding: 40px; max-width: 1200px; margin: 0 auto; width: 100%; }

    .dash-welcome {
      margin-bottom: 48px;
      padding-bottom: 32px;
      border-bottom: 1px solid var(--border);
    }
    .dash-welcome h2 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 36px;
      font-weight: 300;
      letter-spacing: 0.05em;
      margin-bottom: 6px;
    }
    .dash-welcome h2 em { color: var(--gold); font-style: italic; }
    .dash-welcome p { color: var(--text-muted); font-size: 14px; }

    .dash-nav {
      display: flex;
      gap: 4px;
      margin-bottom: 32px;
    }
    .dash-nav-btn {
      padding: 10px 20px;
      background: none;
      border: 1px solid var(--border);
      border-radius: 100px;
      color: var(--text-muted);
      font-family: 'DM Sans', sans-serif;
      font-size: 12px;
      letter-spacing: 0.1em;
      cursor: pointer;
      transition: all 0.2s;
    }
    .dash-nav-btn.active {
      background: rgba(201,169,110,0.1);
      border-color: var(--gold-dim);
      color: var(--gold);
    }
    .dash-nav-btn:hover:not(.active) { border-color: var(--border2); color: var(--text); }
    .count-badge {
      display: inline-block;
      background: var(--gold);
      color: #0a0a0a;
      font-size: 10px;
      font-weight: 600;
      padding: 2px 7px;
      border-radius: 100px;
      margin-left: 6px;
    }

    /* Section */
    .section { display: none; }
    .section.active { display: block; }
    .section-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 22px;
      font-weight: 400;
      margin-bottom: 24px;
      color: var(--text);
      letter-spacing: 0.04em;
    }

    /* Property grid */
    .properties-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 20px;
    }

    .property-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      overflow: hidden;
      transition: border-color 0.2s, transform 0.2s;
    }
    .property-card:hover {
      border-color: var(--border2);
      transform: translateY(-2px);
    }
    .property-card.is-fav { border-color: rgba(201,169,110,0.3); }

    .property-img {
      width: 100%;
      height: 180px;
      object-fit: cover;
      display: block;
      background: var(--surface2);
    }

    .property-body { padding: 18px; }
    .property-type {
      font-size: 10px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--gold-dim);
      margin-bottom: 6px;
    }
    .property-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 19px;
      font-weight: 400;
      margin-bottom: 4px;
      color: var(--text);
    }
    .property-address {
      font-size: 12px;
      color: var(--text-muted);
      margin-bottom: 14px;
    }
    .property-stats {
      display: flex;
      gap: 14px;
      margin-bottom: 14px;
      font-size: 12px;
      color: var(--text-dim);
    }
    .property-stat { display: flex; align-items: center; gap: 4px; }
    .property-price {
      font-family: 'Cormorant Garamond', serif;
      font-size: 20px;
      font-weight: 600;
      color: var(--gold);
      margin-bottom: 16px;
    }

    .property-actions { display: flex; gap: 8px; }
    .fav-btn {
      flex: 1;
      padding: 10px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: none;
      color: var(--text-muted);
      font-family: 'DM Sans', sans-serif;
      font-size: 12px;
      letter-spacing: 0.1em;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }
    .fav-btn.active {
      background: rgba(201,169,110,0.1);
      border-color: var(--gold-dim);
      color: var(--gold);
    }
    .fav-btn:not(.active):hover { border-color: var(--border2); color: var(--text); }
    .fav-btn.active:hover { background: rgba(192,57,43,0.08); border-color: rgba(192,57,43,0.3); color: #e74c3c; }
    .fav-btn.loading { opacity: 0.6; pointer-events: none; }

    /* Empty state */
    .empty-state {
      text-align: center;
      padding: 80px 40px;
      color: var(--text-muted);
    }
    .empty-state .empty-icon {
      font-size: 48px;
      margin-bottom: 16px;
      opacity: 0.4;
    }
    .empty-state h3 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 22px;
      font-weight: 400;
      color: var(--text-dim);
      margin-bottom: 8px;
    }
    .empty-state p { font-size: 13px; }

    /* Toast */
    #toast-container {
      position: fixed;
      bottom: 24px;
      right: 24px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      z-index: 9999;
    }
    .toast {
      padding: 12px 20px;
      border-radius: var(--radius);
      font-size: 13px;
      animation: toastIn 0.3s ease;
      max-width: 300px;
    }
    .toast.success { background: #1a2e1f; border: 1px solid rgba(39,174,96,0.4); color: #2ecc71; }
    .toast.error   { background: #2a1515; border: 1px solid rgba(192,57,43,0.4); color: #e74c3c; }
    @keyframes toastIn {
      from { opacity: 0; transform: translateX(20px); }
      to   { opacity: 1; transform: translateX(0); }
    }

    /* Loading spinner */
    .spinner {
      width: 18px; height: 18px;
      border: 2px solid rgba(201,169,110,0.2);
      border-top-color: var(--gold);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      display: inline-block;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .loading-state {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 80px;
      color: var(--text-muted);
    }

    @media (max-width: 600px) {
      .dash-header { padding: 0 16px; }
      .dash-body { padding: 24px 16px; }
      .properties-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<!-- ══════════════════════════════════════
     AUTH PAGE
══════════════════════════════════════ -->
<div id="page-auth" class="page active">
  <div style="width:100%">
    <div class="auth-logo">
      <h1><span>E</span>stata</h1>
      <p>Luxury Real Estate &middot; Buyer Portal</p>
    </div>

    <div class="auth-card" style="margin:0 auto">
      <div class="auth-tabs">
        <button class="auth-tab active" onclick="switchAuthTab('login')">Sign In</button>
        <button class="auth-tab" onclick="switchAuthTab('register')">Create Account</button>
      </div>

      <div class="auth-form-wrap">
        <div id="auth-alert" class="auth-alert"></div>

        <!-- Login -->
        <form id="form-login" class="auth-form active" onsubmit="handleLogin(event)">
          <div class="form-group">
            <label>Email Address</label>
            <input type="email" id="login-email" placeholder="you@example.com" required />
          </div>
          <div class="form-group">
            <label>Password</label>
            <input type="password" id="login-password" placeholder="••••••••" required />
          </div>
          <button type="submit" class="btn btn-primary" id="btn-login">Sign In</button>
        </form>

        <!-- Register -->
        <form id="form-register" class="auth-form" onsubmit="handleRegister(event)">
          <div class="form-group">
            <label>Full Name</label>
            <input type="text" id="reg-name" placeholder="Jane Smith" required />
          </div>
          <div class="form-group">
            <label>Email Address</label>
            <input type="email" id="reg-email" placeholder="you@example.com" required />
          </div>
          <div class="form-group">
            <label>Password <span style="color:var(--text-muted);text-transform:none;font-style:italic">(min. 6 chars)</span></label>
            <input type="password" id="reg-password" placeholder="••••••••" required minlength="6" />
          </div>
          <button type="submit" class="btn btn-primary" id="btn-register">Create Account</button>
        </form>
      </div>
    </div>
  </div>
</div>

<!-- ══════════════════════════════════════
     DASHBOARD PAGE
══════════════════════════════════════ -->
<div id="page-dashboard" class="page">
  <header class="dash-header">
    <div class="dash-header-logo"><span>E</span>stata</div>
    <div class="dash-header-right">
      <div class="user-badge">
        <div class="user-avatar" id="user-avatar">?</div>
        <div class="user-info">
          <div class="user-name" id="header-user-name">—</div>
          <div class="user-role" id="header-user-role">—</div>
        </div>
      </div>
      <button class="btn btn-ghost" onclick="handleLogout()" style="padding:8px 16px">Sign Out</button>
    </div>
  </header>

  <main class="dash-body">
    <div class="dash-welcome">
      <h2>Welcome back, <em id="welcome-name">—</em></h2>
      <p>Browse properties and manage your favourites.</p>
    </div>

    <div class="dash-nav">
      <button class="dash-nav-btn active" onclick="switchSection('all')">
        All Properties
      </button>
      <button class="dash-nav-btn" id="fav-nav-btn" onclick="switchSection('favourites')">
        My Favourites <span class="count-badge" id="fav-count">0</span>
      </button>
    </div>

    <!-- All Properties Section -->
    <div id="section-all" class="section active">
      <div id="all-properties-content" class="loading-state">
        <span class="spinner"></span> Loading properties…
      </div>
    </div>

    <!-- Favourites Section -->
    <div id="section-favourites" class="section">
      <div id="fav-properties-content" class="loading-state">
        <span class="spinner"></span> Loading favourites…
      </div>
    </div>
  </main>
</div>

<!-- Toast container -->
<div id="toast-container"></div>

<script>
// ═══════════════════════════════════════
// STATE
// ═══════════════════════════════════════
const API = '/api';
let currentUser = null;
let allProperties = [];
let favouriteIds = new Set();

// ═══════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════
function getToken() { return localStorage.getItem('estata_token'); }
function setToken(t) { localStorage.setItem('estata_token', t); }
function clearToken() { localStorage.removeItem('estata_token'); }

async function apiFetch(path, opts = {}) {
  const token = getToken();
  const res = await fetch(API + path, {
    headers: {
      'Content-Type': 'application/json',
      ...(token ? { Authorization: `Bearer ${token}` } : {}),
      ...(opts.headers || {}),
    },
    ...opts,
  });
  const data = await res.json();
  if (!res.ok) throw new Error(data.error || data.errors?.[0]?.msg || 'Request failed');
  return data;
}

function toast(msg, type = 'success') {
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  el.textContent = msg;
  document.getElementById('toast-container').appendChild(el);
  setTimeout(() => el.remove(), 3500);
}

function formatPrice(n) {
  if (n >= 10000000) return `NPR ${(n/10000000).toFixed(1)} Cr`;
  if (n >= 100000) return `NPR ${(n/100000).toFixed(1)} L`;
  return `NPR ${n.toLocaleString()}`;
}

// ═══════════════════════════════════════
// AUTH
// ═══════════════════════════════════════
function showAuthAlert(msg, type = 'error') {
  const el = document.getElementById('auth-alert');
  el.textContent = msg;
  el.className = `auth-alert ${type}`;
  el.style.display = 'block';
}
function hideAuthAlert() {
  document.getElementById('auth-alert').style.display = 'none';
}

function switchAuthTab(tab) {
  document.querySelectorAll('.auth-tab').forEach((t, i) => {
    t.classList.toggle('active', (i === 0 && tab === 'login') || (i === 1 && tab === 'register'));
  });
  document.getElementById('form-login').classList.toggle('active', tab === 'login');
  document.getElementById('form-register').classList.toggle('active', tab === 'register');
  hideAuthAlert();
}

async function handleLogin(e) {
  e.preventDefault();
  hideAuthAlert();
  const btn = document.getElementById('btn-login');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>';
  try {
    const data = await apiFetch('/auth/login', {
      method: 'POST',
      body: JSON.stringify({
        email: document.getElementById('login-email').value,
        password: document.getElementById('login-password').value,
      }),
    });
    setToken(data.token);
    currentUser = data.user;
    await loadDashboard();
  } catch (err) {
    showAuthAlert(err.message);
  } finally {
    btn.disabled = false;
    btn.textContent = 'Sign In';
  }
}

async function handleRegister(e) {
  e.preventDefault();
  hideAuthAlert();
  const btn = document.getElementById('btn-register');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>';
  try {
    const data = await apiFetch('/auth/register', {
      method: 'POST',
      body: JSON.stringify({
        name: document.getElementById('reg-name').value,
        email: document.getElementById('reg-email').value,
        password: document.getElementById('reg-password').value,
      }),
    });
    setToken(data.token);
    currentUser = data.user;
    showAuthAlert('Account created! Welcome aboard.', 'success');
    setTimeout(() => loadDashboard(), 600);
  } catch (err) {
    showAuthAlert(err.message);
  } finally {
    btn.disabled = false;
    btn.textContent = 'Create Account';
  }
}

function handleLogout() {
  clearToken();
  currentUser = null;
  allProperties = [];
  favouriteIds.clear();
  showPage('auth');
}

// ═══════════════════════════════════════
// DASHBOARD
// ═══════════════════════════════════════
function showPage(name) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById(`page-${name}`).classList.add('active');
}

async function loadDashboard() {
  showPage('dashboard');

  // Set header user info
  document.getElementById('header-user-name').textContent = currentUser.name;
  document.getElementById('header-user-role').textContent = currentUser.role;
  document.getElementById('welcome-name').textContent = currentUser.name.split(' ')[0];
  document.getElementById('user-avatar').textContent = currentUser.name[0].toUpperCase();

  // Load data in parallel
  try {
    const [propsData, favData] = await Promise.all([
      apiFetch('/properties'),
      apiFetch('/favourites'),
    ]);
    allProperties = propsData.properties;
    const favProps = favData.favourites;
    favouriteIds = new Set(favProps.map(p => p.id));

    renderAllProperties();
    renderFavouriteProperties();
    updateFavCount();
  } catch (err) {
    toast(err.message, 'error');
  }
}

function switchSection(name) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.dash-nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById(`section-${name}`).classList.add('active');
  event.currentTarget.classList.add('active');
}

function updateFavCount() {
  document.getElementById('fav-count').textContent = favouriteIds.size;
}

function renderAllProperties() {
  const el = document.getElementById('all-properties-content');
  if (!allProperties.length) {
    el.innerHTML = emptyState('No properties available.', 'No listings found in the database.');
    return;
  }
  el.innerHTML = `<div class="properties-grid">${allProperties.map(p => propertyCard(p)).join('')}</div>`;
}

function renderFavouriteProperties() {
  const el = document.getElementById('fav-properties-content');
  const favs = allProperties.filter(p => favouriteIds.has(p.id));
  if (!favs.length) {
    el.innerHTML = emptyState('No favourites yet', 'Browse all properties and heart the ones you love.');
    return;
  }
  el.innerHTML = `<div class="properties-grid">${favs.map(p => propertyCard(p)).join('')}</div>`;
}

function propertyCard(p) {
  const isFav = favouriteIds.has(p.id);
  return `
    <div class="property-card ${isFav ? 'is-fav' : ''}" id="card-${p.id}">
      <img class="property-img" src="${p.image}" alt="${p.title}" loading="lazy" onerror="this.style.background='#1a1a1a'" />
      <div class="property-body">
        <div class="property-type">${p.type}</div>
        <div class="property-title">${p.title}</div>
        <div class="property-address">📍 ${p.address}</div>
        <div class="property-stats">
          <span class="property-stat">🛏 ${p.bedrooms} bed</span>
          <span class="property-stat">🚿 ${p.bathrooms} bath</span>
          <span class="property-stat">📐 ${p.sqft.toLocaleString()} sqft</span>
        </div>
        <div class="property-price">${formatPrice(p.price)}</div>
        <div class="property-actions">
          <button
            class="fav-btn ${isFav ? 'active' : ''}"
            id="fav-btn-${p.id}"
            onclick="toggleFavourite('${p.id}')"
          >
            ${isFav ? '♥ Saved' : '♡ Save'}
          </button>
        </div>
      </div>
    </div>`;
}

function emptyState(title, sub) {
  return `
    <div class="empty-state">
      <div class="empty-icon">🏠</div>
      <h3>${title}</h3>
      <p>${sub}</p>
    </div>`;
}

async function toggleFavourite(propertyId) {
  const btn = document.getElementById(`fav-btn-${propertyId}`);
  btn.classList.add('loading');

  const isFav = favouriteIds.has(propertyId);

  try {
    if (isFav) {
      await apiFetch(`/favourites/${propertyId}`, { method: 'DELETE' });
      favouriteIds.delete(propertyId);
      toast('Removed from favourites');
    } else {
      await apiFetch(`/favourites/${propertyId}`, { method: 'POST' });
      favouriteIds.add(propertyId);
      toast('Added to favourites ♥');
    }
    updateFavCount();
    renderAllProperties();
    renderFavouriteProperties();
  } catch (err) {
    toast(err.message, 'error');
    btn.classList.remove('loading');
  }
}

// ═══════════════════════════════════════
// INIT — auto-login if token exists
// ═══════════════════════════════════════
(async function init() {
  const token = getToken();
  if (!token) return;
  try {
    const data = await apiFetch('/auth/me');
    currentUser = data.user;
    await loadDashboard();
  } catch {
    clearToken();
  }
})();
</script>
</body>
</html>
